<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12.5px; }
      .key   { fill: #e3b341; }
      .str   { fill: #7ee787; }
      .num   { fill: #79c0ff; }
      .bool  { fill: #d2a8ff; }
      .brk   { fill: #e6edf3; }
      .hint  { fill: #484f58; }
      .text  { fill: #e6edf3; }
      .dim   { fill: #484f58; }
      .lnum  { fill: #3b424e; }
      .err   { fill: #ff7b72; }
      .mode  { fill: #e6edf3; font-weight: bold; }
      .idx   { fill: #79c0ff; }
      .cyan  { fill: #79c0ff; }
      .sel   { fill: #1f3a5f; }
    </style>
    <clipPath id="lpane-clip">
      <rect x="3" y="59" width="448" height="480"/>
    </clipPath>
    <clipPath id="rpane-clip">
      <rect x="487" y="59" width="466" height="480"/>
    </clipPath>
  </defs>

  <!-- ── Window frame ──────────────────────────────────── -->
  <rect width="960" height="580" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="960" height="40" rx="10" fill="#161b22"/>
  <rect y="30" width="960" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="20" r="6.5" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6.5" fill="#ffbd2e"/>
  <circle cx="66" cy="20" r="6.5" fill="#27c93f"/>

  <!-- Window title -->
  <text x="480" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#484f58">oe — data/config.json</text>

  <!-- ── Terminal background ──────────────────────────── -->
  <rect x="0" y="40" width="960" height="540" fill="#0d1117"/>

  <!-- ── LEFT PANE border (focused = green) ──────────── -->
  <rect x="2" y="41" width="452" height="517" fill="none" stroke="#2ea043" stroke-width="1.5"/>
  <!-- Left pane title row bg -->
  <text x="11" y="56" class="mono mode" fill="#2ea043">Object Source</text>
  <text x="398" y="56" class="mono cyan" font-weight="bold"> JSON </text>

  <!-- ── SCROLLBAR strip ──────────────────────────────── -->
  <!-- track lines -->
  <text x="458" y="76"  class="mono dim"> │ </text>
  <text x="458" y="96"  class="mono dim"> │ </text>
  <text x="458" y="116" class="mono dim"> │ </text>
  <text x="458" y="136" class="mono dim"> │ </text>
  <text x="458" y="156" class="mono dim"> │ </text>
  <text x="458" y="176" class="mono dim"> │ </text>
  <!-- thumb at ~35% -->
  <text x="458" y="196" class="mono text">███</text>
  <text x="458" y="216" class="mono dim"> │ </text>
  <text x="458" y="236" class="mono dim"> │ </text>
  <text x="458" y="256" class="mono dim"> │ </text>
  <text x="458" y="276" class="mono dim"> │ </text>
  <text x="458" y="296" class="mono dim"> │ </text>
  <text x="458" y="316" class="mono dim"> │ </text>
  <text x="458" y="336" class="mono dim"> │ </text>
  <text x="458" y="356" class="mono dim"> │ </text>
  <text x="458" y="376" class="mono dim"> │ </text>
  <text x="458" y="396" class="mono dim"> │ </text>
  <text x="458" y="416" class="mono dim"> │ </text>
  <text x="458" y="436" class="mono dim"> │ </text>
  <text x="458" y="456" class="mono dim"> │ </text>
  <text x="458" y="476" class="mono dim"> │ </text>
  <text x="458" y="496" class="mono dim"> │ </text>
  <text x="458" y="516" class="mono dim"> │ </text>
  <text x="458" y="536" class="mono dim"> │ </text>

  <!-- ── RIGHT PANE border (unfocused = gray) ─────────── -->
  <rect x="482" y="41" width="476" height="517" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="491" y="56" class="mono dim">Tree View</text>

  <!-- ══ LEFT PANE CONTENT (raw JSON with line numbers) ═══ -->
  <g clip-path="url(#lpane-clip)">
    <!-- line 1 -->
    <text x="8"  y="76" class="mono lnum"> 1</text>
    <text x="38" y="76" class="mono brk">{</text>

    <!-- line 2 -->
    <text x="8"  y="96" class="mono lnum"> 2</text>
    <text x="38" y="96" class="mono brk">  </text>
    <text x="53" y="96" class="mono key">"name"</text>
    <text x="98" y="96" class="mono brk">: </text>
    <text x="113" y="96" class="mono str">"my-api"</text>
    <text x="173" y="96" class="mono brk">,</text>

    <!-- line 3 -->
    <text x="8"  y="116" class="mono lnum"> 3</text>
    <text x="53" y="116" class="mono key">"version"</text>
    <text x="120" y="116" class="mono brk">: </text>
    <text x="135" y="116" class="mono str">"2.1.0"</text>
    <text x="183" y="116" class="mono brk">,</text>

    <!-- line 4 -->
    <text x="8"  y="136" class="mono lnum"> 4</text>
    <text x="53" y="136" class="mono key">"description"</text>
    <text x="150" y="136" class="mono brk">: </text>
    <text x="165" y="136" class="mono str">"REST API service"</text>
    <text x="293" y="136" class="mono brk">,</text>

    <!-- line 5 -->
    <text x="8"  y="156" class="mono lnum"> 5</text>
    <text x="53" y="156" class="mono key">"database"</text>
    <text x="128" y="156" class="mono brk">: {</text>

    <!-- line 6 -->
    <text x="8"  y="176" class="mono lnum"> 6</text>
    <text x="68" y="176" class="mono key">"host"</text>
    <text x="106" y="176" class="mono brk">: </text>
    <text x="121" y="176" class="mono str">"localhost"</text>
    <text x="196" y="176" class="mono brk">,</text>

    <!-- line 7 -->
    <text x="8"  y="196" class="mono lnum"> 7</text>
    <text x="68" y="196" class="mono key">"port"</text>
    <text x="106" y="196" class="mono brk">: </text>
    <text x="121" y="196" class="mono num">5432</text>
    <text x="151" y="196" class="mono brk">,</text>

    <!-- line 8 -->
    <text x="8"  y="216" class="mono lnum"> 8</text>
    <text x="68" y="216" class="mono key">"ssl"</text>
    <text x="99" y="216" class="mono brk">: </text>
    <text x="114" y="216" class="mono bool">true</text>
    <text x="144" y="216" class="mono brk">,</text>

    <!-- line 9 -->
    <text x="8"  y="236" class="mono lnum"> 9</text>
    <text x="68" y="236" class="mono key">"pool"</text>
    <text x="106" y="236" class="mono brk">: </text>
    <text x="121" y="236" class="mono num">10</text>

    <!-- line 10 -->
    <text x="8"  y="256" class="mono lnum">10</text>
    <text x="38" y="256" class="mono brk">  },</text>

    <!-- line 11 -->
    <text x="8"  y="276" class="mono lnum">11</text>
    <text x="53" y="276" class="mono key">"features"</text>
    <text x="128" y="276" class="mono brk">: [</text>

    <!-- line 12 -->
    <text x="8"  y="296" class="mono lnum">12</text>
    <text x="68" y="296" class="mono str">"auth"</text>
    <text x="106" y="296" class="mono brk">,</text>

    <!-- line 13 -->
    <text x="8"  y="316" class="mono lnum">13</text>
    <text x="68" y="316" class="mono str">"cache"</text>
    <text x="113" y="316" class="mono brk">,</text>

    <!-- line 14 -->
    <text x="8"  y="336" class="mono lnum">14</text>
    <text x="68" y="336" class="mono str">"metrics"</text>

    <!-- line 15 -->
    <text x="8"  y="356" class="mono lnum">15</text>
    <text x="38" y="356" class="mono brk">  ],</text>

    <!-- line 16 -->
    <text x="8"  y="376" class="mono lnum">16</text>
    <text x="53" y="376" class="mono key">"timeout"</text>
    <text x="128" y="376" class="mono brk">: </text>
    <text x="143" y="376" class="mono num">30</text>
    <text x="158" y="376" class="mono brk">,</text>

    <!-- line 17 -->
    <text x="8"  y="396" class="mono lnum">17</text>
    <text x="53" y="396" class="mono key">"debug"</text>
    <text x="98"  y="396" class="mono brk">: </text>
    <text x="113" y="396" class="mono bool">false</text>

    <!-- line 18 -->
    <text x="8"  y="416" class="mono lnum">18</text>
    <text x="38" y="416" class="mono brk">}</text>
  </g>

  <!-- ══ RIGHT PANE CONTENT (tree view) ═══════════════ -->
  <g clip-path="url(#rpane-clip)">

    <!-- row 0: root (selected, reversed) -->
    <rect x="484" y="61" width="473" height="19" fill="#1f3a5f"/>
    <text x="491" y="76" class="mono brk">▼ </text>
    <text x="506" y="76" class="mono dim">(root)</text>
    <text x="554" y="76" class="mono brk">            {</text>
    <text x="652" y="76" class="mono hint">  (7 keys)</text>

    <!-- row 1 -->
    <text x="491" y="96"  class="mono brk">    </text>
    <text x="521" y="96"  class="mono key">name</text>
    <text x="551" y="96"  class="mono brk">:             </text>
    <text x="655" y="96"  class="mono str">"my-api"</text>

    <!-- row 2 -->
    <text x="491" y="116" class="mono brk">    </text>
    <text x="521" y="116" class="mono key">version</text>
    <text x="575" y="116" class="mono brk">:          </text>
    <text x="651" y="116" class="mono str">"2.1.0"</text>

    <!-- row 3 -->
    <text x="491" y="136" class="mono brk">    </text>
    <text x="521" y="136" class="mono key">description</text>
    <text x="607" y="136" class="mono brk">:     </text>
    <text x="645" y="136" class="mono str">"REST API service"</text>

    <!-- row 4: database (expanded) -->
    <text x="491" y="156" class="mono brk">  ▼ </text>
    <text x="521" y="156" class="mono key">database</text>
    <text x="583" y="156" class="mono brk">:         {</text>
    <text x="658" y="156" class="mono hint">  (4 keys)</text>

    <!-- row 5 -->
    <text x="491" y="176" class="mono brk">      </text>
    <text x="537" y="176" class="mono key">host</text>
    <text x="567" y="176" class="mono brk">:         </text>
    <text x="643" y="176" class="mono str">"localhost"</text>

    <!-- row 6 -->
    <text x="491" y="196" class="mono brk">      </text>
    <text x="537" y="196" class="mono key">port</text>
    <text x="567" y="196" class="mono brk">:         </text>
    <text x="643" y="196" class="mono num">5432</text>

    <!-- row 7 -->
    <text x="491" y="216" class="mono brk">      </text>
    <text x="537" y="216" class="mono key">ssl</text>
    <text x="560" y="216" class="mono brk">:         </text>
    <text x="636" y="216" class="mono bool">true</text>

    <!-- row 8 -->
    <text x="491" y="236" class="mono brk">      </text>
    <text x="537" y="236" class="mono key">pool</text>
    <text x="567" y="236" class="mono brk">:         </text>
    <text x="643" y="236" class="mono num">10</text>

    <!-- row 9: features (expanded) -->
    <text x="491" y="256" class="mono brk">  ▼ </text>
    <text x="521" y="256" class="mono key">features</text>
    <text x="583" y="256" class="mono brk">:         [</text>
    <text x="658" y="256" class="mono hint">  (3 items)</text>

    <!-- row 10 -->
    <text x="491" y="276" class="mono brk">      </text>
    <text x="537" y="276" class="mono idx">[0]</text>
    <text x="560" y="276" class="mono brk">:         </text>
    <text x="636" y="276" class="mono str">"auth"</text>

    <!-- row 11 -->
    <text x="491" y="296" class="mono brk">      </text>
    <text x="537" y="296" class="mono idx">[1]</text>
    <text x="560" y="296" class="mono brk">:         </text>
    <text x="636" y="296" class="mono str">"cache"</text>

    <!-- row 12 -->
    <text x="491" y="316" class="mono brk">      </text>
    <text x="537" y="316" class="mono idx">[2]</text>
    <text x="560" y="316" class="mono brk">:         </text>
    <text x="636" y="316" class="mono str">"metrics"</text>

    <!-- row 13 -->
    <text x="491" y="336" class="mono brk">    </text>
    <text x="521" y="336" class="mono key">timeout</text>
    <text x="575" y="336" class="mono brk">:         </text>
    <text x="651" y="336" class="mono num">30</text>

    <!-- row 14 -->
    <text x="491" y="356" class="mono brk">    </text>
    <text x="521" y="356" class="mono key">debug</text>
    <text x="559" y="356" class="mono brk">:         </text>
    <text x="635" y="356" class="mono bool">false</text>
  </g>

  <!-- ── Status bar ────────────────────────────────────── -->
  <rect x="0" y="558" width="960" height="22" fill="#161b22"/>
  <text x="4" y="574" class="mono mode">[NORMAL]</text>
  <text x="76" y="574" class="mono text">  data/config.json</text>
  <text x="955" y="574" class="mono dim" text-anchor="end">i:edit  Tab:switch  /:search  Ctrl+O:open  Ctrl+S:save  ?:about</text>

  <!-- ── Subtle outer glow ─────────────────────────────── -->
  <rect width="960" height="580" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
