<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <defs>

    <!-- ── Egg gradients — radial, highlight at top-left ── -->
    <radialGradient id="eg1" cx="33%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#f8924e"/>
      <stop offset="55%"  stop-color="#e05520"/>
      <stop offset="100%" stop-color="#8c2e08"/>
    </radialGradient>
    <radialGradient id="eg2" cx="33%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#f9a060"/>
      <stop offset="55%"  stop-color="#d94e18"/>
      <stop offset="100%" stop-color="#852a06"/>
    </radialGradient>
    <radialGradient id="eg3" cx="33%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#f7874a"/>
      <stop offset="55%"  stop-color="#e35c24"/>
      <stop offset="100%" stop-color="#91320a"/>
    </radialGradient>
    <radialGradient id="eg4" cx="33%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#f8984f"/>
      <stop offset="55%"  stop-color="#db5219"/>
      <stop offset="100%" stop-color="#883108"/>
    </radialGradient>

    <!-- ── Soft drop shadow for egg cluster ── -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- ── Background subtle inner glow ── -->
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

  </defs>

  <!-- ── Window background ───────────────────────────── -->
  <rect width="560" height="160" rx="12" fill="url(#bggrad)"/>

  <!-- ── Subtle top edge highlight ── -->
  <rect width="560" height="1" rx="0" y="0" fill="rgba(255,255,255,0.06)"/>
  <rect width="560" height="160" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ══ Fish egg cluster ════════════════════════════════
       9 eggs in a close-packed oval, center ≈ (78, 84)
       Rows (top→bottom):
         y=63  x=64,82         (2 eggs)
         y=78  x=55,73,91      (3 eggs)
         y=93  x=64,82,100     (3 eggs)
         y=108 x=73            (1 egg)
  ═══════════════════════════════════════════════════════ -->

  <g filter="url(#shadow)">
    <!-- row 1 -->
    <circle cx="64"  cy="63"  r="10" fill="url(#eg2)"/>
    <circle cx="82"  cy="63"  r="10" fill="url(#eg3)"/>
    <!-- row 2 -->
    <circle cx="55"  cy="78"  r="10" fill="url(#eg4)"/>
    <circle cx="73"  cy="78"  r="11" fill="url(#eg1)"/>  <!-- center, slightly larger -->
    <circle cx="91"  cy="78"  r="10" fill="url(#eg3)"/>
    <!-- row 3 -->
    <circle cx="64"  cy="93"  r="10" fill="url(#eg1)"/>
    <circle cx="82"  cy="93"  r="11" fill="url(#eg2)"/>  <!-- slightly larger -->
    <circle cx="100" cy="93"  r="10" fill="url(#eg4)"/>
    <!-- row 4 -->
    <circle cx="73"  cy="108" r="9"  fill="url(#eg3)"/>
  </g>

  <!-- ── Specular highlights (small bright dot, top-left of each egg) ── -->
  <circle cx="60"  cy="59"  r="2.8" fill="rgba(255,255,255,0.42)"/>
  <circle cx="78"  cy="59"  r="2.8" fill="rgba(255,255,255,0.38)"/>
  <circle cx="51"  cy="74"  r="2.5" fill="rgba(255,255,255,0.38)"/>
  <circle cx="69"  cy="74"  r="3.2" fill="rgba(255,255,255,0.44)"/>
  <circle cx="87"  cy="74"  r="2.5" fill="rgba(255,255,255,0.36)"/>
  <circle cx="60"  cy="89"  r="2.8" fill="rgba(255,255,255,0.40)"/>
  <circle cx="78"  cy="89"  r="3.0" fill="rgba(255,255,255,0.42)"/>
  <circle cx="96"  cy="89"  r="2.5" fill="rgba(255,255,255,0.36)"/>
  <circle cx="69"  cy="104" r="2.4" fill="rgba(255,255,255,0.35)"/>

  <!-- ══ Logotype ════════════════════════════════════════ -->

  <!-- "roe" — bold monospace, Rust orange -->
  <text
    x="138" y="102"
    font-family="'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace"
    font-size="62"
    font-weight="bold"
    letter-spacing="-1"
    fill="#e05520">roe</text>

  <!-- Blinking cursor after "roe" -->
  <rect x="344" y="50" width="5" height="56" rx="1" fill="#e05520" opacity="0.75">
    <animate attributeName="opacity" values="0.75;0;0.75" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle: "Rust Object Editor" -->
  <text
    x="139" y="126"
    font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
    font-size="14.5"
    letter-spacing="0.5"
    fill="#6e7681">Rust Object Editor</text>

  <!-- Format tags row -->
  <text
    x="139" y="148"
    font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
    font-size="12"
    letter-spacing="0.3"
    fill="#3b424e">JSON</text>
  <text x="184" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#2a3040"> · </text>
  <text x="199" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#3b424e">YAML</text>
  <text x="244" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#2a3040"> · </text>
  <text x="259" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#3b424e">TOML</text>
  <text x="304" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#2a3040"> · </text>
  <text x="319" y="148" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#3b424e">XML</text>

</svg>
