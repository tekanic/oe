<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12.5px; }
      .key   { fill: #e3b341; }
      .str   { fill: #7ee787; }
      .num   { fill: #79c0ff; }
      .bool  { fill: #d2a8ff; }
      .brk   { fill: #e6edf3; }
      .text  { fill: #e6edf3; }
      .dim   { fill: #484f58; }
      .lnum  { fill: #3b424e; }
      .mode  { fill: #e6edf3; font-weight: bold; }
      .idx   { fill: #79c0ff; }
      .cyan  { fill: #79c0ff; }
      .match { fill: #e3b341; font-weight: bold; }
      .hint  { fill: #484f58; }
    </style>
    <clipPath id="lpane2">
      <rect x="3" y="59" width="448" height="480"/>
    </clipPath>
    <clipPath id="rpane2">
      <rect x="487" y="59" width="466" height="480"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <rect width="960" height="580" rx="10" fill="#0d1117"/>
  <rect width="960" height="40" rx="10" fill="#161b22"/>
  <rect y="30" width="960" height="10" fill="#161b22"/>
  <circle cx="22" cy="20" r="6.5" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6.5" fill="#ffbd2e"/>
  <circle cx="66" cy="20" r="6.5" fill="#27c93f"/>
  <text x="480" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#484f58">oe — data/config.json</text>

  <!-- Terminal bg -->
  <rect x="0" y="40" width="960" height="540" fill="#0d1117"/>

  <!-- Left pane border (unfocused, search is active) -->
  <rect x="2" y="41" width="452" height="517" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="11" y="56" class="mono dim">Object Source</text>
  <text x="398" y="56" class="mono cyan" font-weight="bold"> JSON </text>

  <!-- Scrollbar -->
  <text x="458" y="76"  class="mono dim"> │ </text>
  <text x="458" y="96"  class="mono dim"> │ </text>
  <text x="458" y="116" class="mono dim"> │ </text>
  <text x="458" y="136" class="mono text">███</text>
  <text x="458" y="156" class="mono dim"> │ </text>
  <text x="458" y="176" class="mono dim"> │ </text>
  <text x="458" y="196" class="mono dim"> │ </text>
  <text x="458" y="216" class="mono dim"> │ </text>
  <text x="458" y="236" class="mono dim"> │ </text>
  <text x="458" y="256" class="mono dim"> │ </text>
  <text x="458" y="276" class="mono dim"> │ </text>
  <text x="458" y="296" class="mono dim"> │ </text>
  <text x="458" y="316" class="mono dim"> │ </text>
  <text x="458" y="336" class="mono dim"> │ </text>
  <text x="458" y="356" class="mono dim"> │ </text>
  <text x="458" y="376" class="mono dim"> │ </text>
  <text x="458" y="396" class="mono dim"> │ </text>
  <text x="458" y="416" class="mono dim"> │ </text>
  <text x="458" y="436" class="mono dim"> │ </text>
  <text x="458" y="456" class="mono dim"> │ </text>
  <text x="458" y="476" class="mono dim"> │ </text>
  <text x="458" y="496" class="mono dim"> │ </text>
  <text x="458" y="516" class="mono dim"> │ </text>
  <text x="458" y="536" class="mono dim"> │ </text>

  <!-- Right pane border (focused = green, tree has search focus) -->
  <rect x="482" y="41" width="476" height="517" fill="none" stroke="#2ea043" stroke-width="1.5"/>
  <text x="491" y="56" class="mono mode" fill="#2ea043">Tree View</text>

  <!-- Left pane content (dimmed, search active on right) -->
  <g clip-path="url(#lpane2)" opacity="0.55">
    <text x="8"  y="76"  class="mono lnum"> 1</text><text x="38"  y="76"  class="mono brk">{</text>
    <text x="8"  y="96"  class="mono lnum"> 2</text><text x="53"  y="96"  class="mono key">"name"</text><text x="98"  y="96"  class="mono brk">: </text><text x="113" y="96"  class="mono str">"my-api"</text><text x="173" y="96"  class="mono brk">,</text>
    <text x="8"  y="116" class="mono lnum"> 3</text><text x="53"  y="116" class="mono key">"version"</text><text x="120" y="116" class="mono brk">: </text><text x="135" y="116" class="mono str">"2.1.0"</text><text x="183" y="116" class="mono brk">,</text>
    <text x="8"  y="136" class="mono lnum"> 4</text><text x="53"  y="136" class="mono key">"description"</text><text x="150" y="136" class="mono brk">: </text><text x="165" y="136" class="mono str">"REST API service"</text><text x="293" y="136" class="mono brk">,</text>
    <text x="8"  y="156" class="mono lnum"> 5</text><text x="53"  y="156" class="mono key">"database"</text><text x="128" y="156" class="mono brk">: {</text>
    <text x="8"  y="176" class="mono lnum"> 6</text><text x="68"  y="176" class="mono key">"host"</text><text x="106" y="176" class="mono brk">: </text><text x="121" y="176" class="mono str">"localhost"</text><text x="196" y="176" class="mono brk">,</text>
    <text x="8"  y="196" class="mono lnum"> 7</text><text x="68"  y="196" class="mono key">"port"</text><text x="106" y="196" class="mono brk">: </text><text x="121" y="196" class="mono num">5432</text><text x="151" y="196" class="mono brk">,</text>
    <text x="8"  y="216" class="mono lnum"> 8</text><text x="68"  y="216" class="mono key">"ssl"</text><text x="99"  y="216" class="mono brk">: </text><text x="114" y="216" class="mono bool">true</text><text x="144" y="216" class="mono brk">,</text>
    <text x="8"  y="236" class="mono lnum"> 9</text><text x="68"  y="236" class="mono key">"pool"</text><text x="106" y="236" class="mono brk">: </text><text x="121" y="236" class="mono num">10</text>
    <text x="8"  y="256" class="mono lnum">10</text><text x="38"  y="256" class="mono brk">  },</text>
    <text x="8"  y="276" class="mono lnum">11</text><text x="53"  y="276" class="mono key">"features"</text><text x="128" y="276" class="mono brk">: [</text>
    <text x="8"  y="296" class="mono lnum">12</text><text x="68"  y="296" class="mono str">"auth"</text><text x="106" y="296" class="mono brk">,</text>
    <text x="8"  y="316" class="mono lnum">13</text><text x="68"  y="316" class="mono str">"cache"</text><text x="113" y="316" class="mono brk">,</text>
    <text x="8"  y="336" class="mono lnum">14</text><text x="68"  y="336" class="mono str">"metrics"</text>
    <text x="8"  y="356" class="mono lnum">15</text><text x="38"  y="356" class="mono brk">  ],</text>
    <text x="8"  y="376" class="mono lnum">16</text><text x="53"  y="376" class="mono key">"timeout"</text><text x="128" y="376" class="mono brk">: </text><text x="143" y="376" class="mono num">30</text><text x="158" y="376" class="mono brk">,</text>
    <text x="8"  y="396" class="mono lnum">17</text><text x="53"  y="396" class="mono key">"debug"</text><text x="98"  y="396" class="mono brk">: </text><text x="113" y="396" class="mono bool">false</text>
    <text x="8"  y="416" class="mono lnum">18</text><text x="38"  y="416" class="mono brk">}</text>
  </g>

  <!-- Right pane: tree with search matches highlighted -->
  <g clip-path="url(#rpane2)">
    <!-- root row -->
    <text x="491" y="76"  class="mono brk">▼ </text><text x="506" y="76" class="mono dim">(root)</text><text x="554" y="76" class="mono brk">            {</text><text x="652" y="76" class="mono hint">  (7 keys)</text>

    <!-- "name" - dimmed (no match) -->
    <text x="491" y="96"  class="mono brk" opacity="0.4">    </text>
    <text x="521" y="96"  class="mono key" opacity="0.4">name</text>
    <text x="551" y="96"  class="mono brk" opacity="0.4">:             </text>
    <text x="655" y="96"  class="mono str" opacity="0.4">"my-api"</text>

    <!-- "version" - dimmed -->
    <text x="491" y="116" class="mono brk" opacity="0.4">    </text>
    <text x="521" y="116" class="mono key" opacity="0.4">version</text>
    <text x="575" y="116" class="mono brk" opacity="0.4">:          </text>
    <text x="651" y="116" class="mono str" opacity="0.4">"2.1.0"</text>

    <!-- "description" - dimmed -->
    <text x="491" y="136" class="mono brk" opacity="0.4">    </text>
    <text x="521" y="136" class="mono key" opacity="0.4">description</text>
    <text x="607" y="136" class="mono brk" opacity="0.4">:     </text>
    <text x="645" y="136" class="mono str" opacity="0.4">"REST API service"</text>

    <!-- "database" container - MATCH on key -->
    <rect x="484" y="141" width="473" height="19" fill="#1f2d0f"/>
    <text x="491" y="156" class="mono brk">  ▼ </text>
    <text x="521" y="156" class="mono match">database</text>
    <text x="583" y="156" class="mono brk">:         {</text>
    <text x="658" y="156" class="mono hint">  (4 keys)</text>

    <!-- host - match on value "localhost" contains... nope, search for "host" -->
    <!-- host key - MATCH -->
    <rect x="484" y="161" width="473" height="19" fill="#1f2d0f"/>
    <text x="491" y="176" class="mono brk">      </text>
    <text x="537" y="176" class="mono match">host</text>
    <text x="567" y="176" class="mono brk">:         </text>
    <text x="643" y="176" class="mono str">"localhost"</text>

    <!-- port -->
    <text x="491" y="196" class="mono brk" opacity="0.4">      </text>
    <text x="537" y="196" class="mono key" opacity="0.4">port</text>
    <text x="567" y="196" class="mono brk" opacity="0.4">:         </text>
    <text x="643" y="196" class="mono num" opacity="0.4">5432</text>

    <!-- ssl -->
    <text x="491" y="216" class="mono brk" opacity="0.4">      </text>
    <text x="537" y="216" class="mono key" opacity="0.4">ssl</text>
    <text x="560" y="216" class="mono brk" opacity="0.4">:         </text>
    <text x="636" y="216" class="mono bool" opacity="0.4">true</text>

    <!-- pool -->
    <text x="491" y="236" class="mono brk" opacity="0.4">      </text>
    <text x="537" y="236" class="mono key" opacity="0.4">pool</text>
    <text x="567" y="236" class="mono brk" opacity="0.4">:         </text>
    <text x="643" y="236" class="mono num" opacity="0.4">10</text>

    <!-- features dimmed -->
    <text x="491" y="256" class="mono brk" opacity="0.4">  ▼ </text>
    <text x="521" y="256" class="mono key" opacity="0.4">features</text>
    <text x="583" y="256" class="mono brk" opacity="0.4">:         [</text>
    <text x="658" y="256" class="mono hint" opacity="0.4">  (3 items)</text>

    <text x="491" y="276" class="mono brk" opacity="0.4">      </text><text x="537" y="276" class="mono idx" opacity="0.4">[0]</text><text x="560" y="276" class="mono brk" opacity="0.4">:         </text><text x="636" y="276" class="mono str" opacity="0.4">"auth"</text>
    <text x="491" y="296" class="mono brk" opacity="0.4">      </text><text x="537" y="296" class="mono idx" opacity="0.4">[1]</text><text x="560" y="296" class="mono brk" opacity="0.4">:         </text><text x="636" y="296" class="mono str" opacity="0.4">"cache"</text>
    <text x="491" y="316" class="mono brk" opacity="0.4">      </text><text x="537" y="316" class="mono idx" opacity="0.4">[2]</text><text x="560" y="316" class="mono brk" opacity="0.4">:         </text><text x="636" y="316" class="mono str" opacity="0.4">"metrics"</text>
    <text x="491" y="336" class="mono brk" opacity="0.4">    </text><text x="521" y="336" class="mono key" opacity="0.4">timeout</text><text x="575" y="336" class="mono brk" opacity="0.4">:         </text><text x="651" y="336" class="mono num" opacity="0.4">30</text>
    <text x="491" y="356" class="mono brk" opacity="0.4">    </text><text x="521" y="356" class="mono key" opacity="0.4">debug</text><text x="559" y="356" class="mono brk" opacity="0.4">:         </text><text x="635" y="356" class="mono bool" opacity="0.4">false</text>
  </g>

  <!-- Status bar: SEARCH mode -->
  <rect x="0" y="558" width="960" height="22" fill="#161b22"/>
  <text x="4" y="574" class="mono mode">[SEARCH]</text>
  <text x="80" y="574" class="mono text">  Search: </text>
  <text x="148" y="574" class="mono text">host</text>
  <text x="178" y="574" class="mono text">_</text>
  <text x="198" y="574" class="mono match">  2 matches</text>
  <text x="955" y="574" class="mono dim" text-anchor="end">↑↓:navigate  Enter:jump  Ctrl+R:replace  Esc:cancel</text>

  <rect width="960" height="580" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
